<!DOCTYPE html>
<html lang="ru">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>sweetRaspberry | Fansly</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #008080 50%, #00ffff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      padding: 40px 30px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #EE9572, #FFA07A);
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      color: white;
      border: 4px solid white;
      box-shadow: 0 8px 25px rgba(240, 147, 251, 0.4);
    }

    .name {
      font-size: 28px;
      font-weight: 700;
      color: #8B0000;
      margin-bottom: 8px;
    }

    .handle {
      color: #8B3A62;
      font-size: 16px;
      margin-bottom: 20px;
    }

    .bio {
      color: #8B636C;
      line-height: 1.6;
      margin-bottom: 30px;
      font-size: 15px;
    }

    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #696969, #708090);
      color: white;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
      width: 100%;
      max-width: 300px;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(102, 126, 234, 0.6);
    }

    .btn:active {
      transform: translateY(-1px);
    }

    .platform {
      margin-top: 25px;
      font-size: 13px;
      color:#ADD8E6;
    }

    .platform svg {
      vertical-align: middle;
      margin-right: 5px;
    }

    .footer {
      margin-top: 30px;
      font-size: 12px;
      color: #AFEEEE;
    }

    /* Адаптивность */
    @media (max-width: 480px) {
      .card {
        padding: 30px 20px;
      }
      .name {
        font-size: 24px;
      }
    }
  </style>
</head>
